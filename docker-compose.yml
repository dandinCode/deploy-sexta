services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: deploy
      POSTGRES_PASSWORD: sexta
      POSTGRES_DB: deploy_sexta
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deploy -d deploy_sexta"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://deploy:sexta@db:5432/deploy_sexta?schema=public
      PORT: 3001
      HOST: 0.0.0.0
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:3001/api
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
